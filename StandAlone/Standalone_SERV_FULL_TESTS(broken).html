<script type="module">

import { runClang } from 'https://cdn.jsdelivr.net/npm/@yowasp/clang/gen/bundle.js';

// ── ASSEMBLER ──────────────────────────────────────────────────────────────
const ASM = (() => {
    const REG = {
        x0:0,zero:0,ra:1,sp:2,gp:3,tp:4,t0:5,t1:6,t2:7,
        s0:8,fp:8,s1:9,a0:10,a1:11,a2:12,a3:13,a4:14,a5:15,
        a6:16,a7:17,s2:18,s3:19,s4:20,s5:21,s6:22,s7:23,
        s8:24,s9:25,s10:26,s11:27,t3:28,t4:29,t5:30,t6:31
    };
    for(let i=1; i<32; i++) REG['x'+i] = i;

    const pr = r => REG[r.replace(/[,]/g,'').trim()] ?? 0;
    const pi = i => parseInt(i.replace(/[,]/g,'').trim());
    const encR = (f7,rs2,rs1,f3,rd,op) => ((f7<<25)|(rs2<<20)|(rs1<<15)|(f3<<12)|(rd<<7)|op)>>>0;
    const encI = (imm,rs1,f3,rd,op) => (((imm&0xFFF)<<20)|(rs1<<15)|(f3<<12)|(rd<<7)|op)>>>0;
    const encS = (imm,rs2,rs1,f3,op) => ((((imm>>5)&0x7F)<<25)|(rs2<<20)|(rs1<<15)|(f3<<12)|((imm&0x1F)<<7)|op)>>>0;
    const encB = (imm,rs2,rs1,f3,op) => ((((imm>>12)&1)<<31)|(((imm>>5)&0x3F)<<25)|(rs2<<20)|(rs1<<15)|(f3<<12)|(((imm>>1)&0xF)<<8)|(((imm>>11)&1)<<7)|op)>>>0;
    const encU = (imm,rd,op) => ((imm&0xFFFFF000)|(rd<<7)|op)>>>0;
    const encJ = (imm,rd,op) => ((((imm>>20)&1)<<31)|(((imm>>1)&0x3FF)<<21)|(((imm>>11)&1)<<20)|(((imm>>12)&0xFF)<<12)|(rd<<7)|op)>>>0;

    return function assemble(lines) {
        const labels = {};
        let pc = 0;
        for (const line of lines) {
            let l = line.split('#')[0].trim();
            if (!l) continue;
            if (l.includes(':')) {
                labels[l.split(':')[0].trim()] = pc;
                l = l.split(':').slice(1).join(':').trim();
            }
            if (l) pc += 4;
        }
        pc = 0;
        const words = [];
        for (const line of lines) {
            let l = line.split('#')[0].trim();
            if (!l) continue;
            if (l.includes(':')) l = l.split(':').slice(1).join(':').trim();
            if (!l) continue;
            const parts = l.split(/[\s,()]+/).filter(x => x);
            const op = parts[0];
            const lbl = name => isNaN(parseInt(name)) ? (labels[name] - pc) : parseInt(name);
            let w = 0;
            switch(op) {
                case 'addi':  w = encI(pi(parts[3]), pr(parts[2]), 0, pr(parts[1]), 0x13); break;
                case 'slti':  w = encI(pi(parts[3]), pr(parts[2]), 2, pr(parts[1]), 0x13); break;
                case 'sltiu': w = encI(pi(parts[3]), pr(parts[2]), 3, pr(parts[1]), 0x13); break;
                case 'xori':  w = encI(pi(parts[3]), pr(parts[2]), 4, pr(parts[1]), 0x13); break;
                case 'ori':   w = encI(pi(parts[3]), pr(parts[2]), 6, pr(parts[1]), 0x13); break;
                case 'andi':  w = encI(pi(parts[3]), pr(parts[2]), 7, pr(parts[1]), 0x13); break;
                case 'slli':  w = encI((pi(parts[3])&0x1F),       pr(parts[2]), 1, pr(parts[1]), 0x13); break;
                case 'srli':  w = encI((pi(parts[3])&0x1F),       pr(parts[2]), 5, pr(parts[1]), 0x13); break;
                case 'srai':  w = encI((pi(parts[3])&0x1F)|0x400, pr(parts[2]), 5, pr(parts[1]), 0x13); break;
                case 'add':   w = encR(0,    pr(parts[3]), pr(parts[2]), 0, pr(parts[1]), 0x33); break;
                case 'sub':   w = encR(0x20, pr(parts[3]), pr(parts[2]), 0, pr(parts[1]), 0x33); break;
                case 'sll':   w = encR(0,    pr(parts[3]), pr(parts[2]), 1, pr(parts[1]), 0x33); break;
                case 'slt':   w = encR(0,    pr(parts[3]), pr(parts[2]), 2, pr(parts[1]), 0x33); break;
                case 'sltu':  w = encR(0,    pr(parts[3]), pr(parts[2]), 3, pr(parts[1]), 0x33); break;
                case 'xor':   w = encR(0,    pr(parts[3]), pr(parts[2]), 4, pr(parts[1]), 0x33); break;
                case 'srl':   w = encR(0,    pr(parts[3]), pr(parts[2]), 5, pr(parts[1]), 0x33); break;
                case 'sra':   w = encR(0x20, pr(parts[3]), pr(parts[2]), 5, pr(parts[1]), 0x33); break;
                case 'or':    w = encR(0,    pr(parts[3]), pr(parts[2]), 6, pr(parts[1]), 0x33); break;
                case 'and':   w = encR(0,    pr(parts[3]), pr(parts[2]), 7, pr(parts[1]), 0x33); break;
                case 'lui':   w = encU(pi(parts[2])<<12, pr(parts[1]), 0x37); break;
                case 'auipc': w = encU(pi(parts[2])<<12, pr(parts[1]), 0x17); break;
                case 'lb':    w = encI(pi(parts[2]), pr(parts[3]), 0, pr(parts[1]), 0x03); break;
                case 'lh':    w = encI(pi(parts[2]), pr(parts[3]), 1, pr(parts[1]), 0x03); break;
                case 'lw':    w = encI(pi(parts[2]), pr(parts[3]), 2, pr(parts[1]), 0x03); break;
                case 'lbu':   w = encI(pi(parts[2]), pr(parts[3]), 4, pr(parts[1]), 0x03); break;
                case 'lhu':   w = encI(pi(parts[2]), pr(parts[3]), 5, pr(parts[1]), 0x03); break;
                case 'sb':    w = encS(pi(parts[2]), pr(parts[1]), pr(parts[3]), 0, 0x23); break;
                case 'sh':    w = encS(pi(parts[2]), pr(parts[1]), pr(parts[3]), 1, 0x23); break;
                case 'sw':    w = encS(pi(parts[2]), pr(parts[1]), pr(parts[3]), 2, 0x23); break;
                case 'beq':   w = encB(lbl(parts[3]), pr(parts[2]), pr(parts[1]), 0, 0x63); break;
                case 'bne':   w = encB(lbl(parts[3]), pr(parts[2]), pr(parts[1]), 1, 0x63); break;
                case 'blt':   w = encB(lbl(parts[3]), pr(parts[2]), pr(parts[1]), 4, 0x63); break;
                case 'bge':   w = encB(lbl(parts[3]), pr(parts[2]), pr(parts[1]), 5, 0x63); break;
                case 'bltu':  w = encB(lbl(parts[3]), pr(parts[2]), pr(parts[1]), 6, 0x63); break;
                case 'bgeu':  w = encB(lbl(parts[3]), pr(parts[2]), pr(parts[1]), 7, 0x63); break;
                case 'jal':   w = encJ(lbl(parts[2]), pr(parts[1]), 0x6f); break;
                case 'jalr':  w = encI(pi(parts[3]), pr(parts[2]), 0, pr(parts[1]), 0x67); break;
                case 'j':     w = encJ(lbl(parts[1]), 0, 0x6f); break;
                case 'csrrw':  w = encI(pi(parts[2]), pr(parts[3]), 1, pr(parts[1]), 0x73); break;
                case 'csrrs':  w = encI(pi(parts[2]), pr(parts[3]), 2, pr(parts[1]), 0x73); break;
                case 'csrrc':  w = encI(pi(parts[2]), pr(parts[3]), 3, pr(parts[1]), 0x73); break;
                case 'csrrwi': w = encI(pi(parts[2]), pi(parts[3])&0x1F, 5, pr(parts[1]), 0x73); break;
                case 'csrrsi': w = encI(pi(parts[2]), pi(parts[3])&0x1F, 6, pr(parts[1]), 0x73); break;
                case 'csrrci': w = encI(pi(parts[2]), pi(parts[3])&0x1F, 7, pr(parts[1]), 0x73); break;
                case 'csrr':   w = encI(pi(parts[2]), 0, 2, pr(parts[1]), 0x73); break;
                case 'ecall':  w = 0x00000073; break;
                case 'ebreak': w = 0x00100073; break;
                case 'mret':   w = 0x30200073; break;
                case 'nop':    w = 0x00000013; break;
                case '.word':  w = (pi(parts[1]))>>>0; break;
                default: throw new Error('Unknown opcode: ' + op);
            }
            words.push(w);
            pc += 4;
        }
        return words;
    };
})();

function mem(cpu, idx) { return cpu.read_mem(idx) >>> 0; }

// ── FULL TEST SUITE (125+ ASSERTIONS) ────────────────────────────────────────
const TESTS = [
    // ════════════════════════════════════════════════════════
    // SECTION 1: BUS SIGNAL INTEGRITY
    // ════════════════════════════════════════════════════════
    {
        name: "Bus: ibus_cyc=0 held during entire rst_n=0 period",
        asm: ["ebreak"],
        verify(cpu) { return cpu.run_reset_check() === 0; }
    },
    {
        name: "Bus: ibus_adr always word-aligned (bits 1:0 = 0)",
        asm: ["addi a0,zero,1","addi a1,zero,2","sw a0,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return (Number(cpu.get_flags()) & (1<<8)) === 0; }
    },
    {
        name: "Bus: dbus_adr always word-aligned for sub-word stores",
        asm: ["addi a0,zero,0xAA","sb a0,257(zero)","sb a0,258(zero)","sb a0,259(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return (Number(cpu.get_flags()) & (1<<9)) === 0; }
    },
    {
        name: "Double-reset mid-execution returns to clean state",
        asm: ["addi a0,zero,7","sw a0,256(zero)","ebreak"],
        verify(cpu) {
            cpu.init_cpu();
            const prog1 = ASM(["addi a0,zero,99","addi a0,a0,1","addi a0,a0,1","sw a0,256(zero)","ebreak"]);
            prog1.forEach((w,i) => cpu.load_inst(i,w));
            cpu.run_cycles(5);
            cpu.init_cpu();
            const prog2 = ASM(["addi a0,zero,7","sw a0,256(zero)","ebreak"]);
            prog2.forEach((w,i) => cpu.load_inst(i,w));
            cpu.run_cycles(100000);
            return mem(cpu, 64) === 7;
        }
    },

    // ════════════════════════════════════════════════════════
    // SECTION 2: REGISTER FILE
    // ════════════════════════════════════════════════════════
    {
        name: "RF: All registers zero after reset",
        asm: ["sw x1,256(zero)","sw x2,260(zero)","sw x31,264(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0 && mem(cpu,65)===0 && mem(cpu,66)===0; }
    },
    {
        name: "RF: x1-x31 independent, x0 always zero after write attempt",
        asm: ["addi x1,zero,1","addi x2,zero,2","addi x31,zero,31","add x0,x1,x2","sw x1,256(zero)","sw x2,260(zero)","sw x31,264(zero)","sw x0,268(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===1 && mem(cpu,65)===2 && mem(cpu,66)===31 && mem(cpu,67)===0; }
    },
    {
        name: "RF: Read-after-Write in consecutive instructions",
        asm: ["addi x1,zero,42","add x2,x1,x1","sw x2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===84; }
    },
    {
        name: "RF: Write to x0 discards result",
        asm: ["addi x0,zero,999","sw x0,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },

    // ════════════════════════════════════════════════════════
    // SECTION 3: ALU — ADDITION
    // ════════════════════════════════════════════════════════
    {
        name: "ALU Add: 0 + 0 = 0",
        asm: ["add a0,zero,zero","sw a0,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Add: 1 + 0 = 1",
        asm: ["addi a0,zero,1","add a1,a0,zero","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===1; }
    },
    {
        name: "ALU Add: 0xFFFFFFFF + 1 = 0 (wraparound)",
        asm: ["addi a0,zero,-1","addi a1,zero,1","add a2,a0,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Add: 0x7FFFFFFF + 1 = 0x80000000 (signed overflow)",
        asm: ["lui a0,0x80000","addi a0,a0,-1","addi a1,zero,1","add a2,a0,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0x80000000; }
    },
    {
        name: "ALU Add: 0x80000000 + 0x80000000 = 0",
        asm: ["lui a0,0x80000","add a1,a0,a0","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Add: -1 + 1 = 0",
        asm: ["addi a0,zero,-1","addi a1,zero,1","add a2,a0,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Add: mid-range 0x12345678 + 0x87654321 = 0x99999999",
        asm: ["lui a0,0x12345","addi a0,a0,0x678","lui a1,0x87654","addi a1,a1,0x321","add a2,a0,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0x99999999; }
    },

    // ════════════════════════════════════════════════════════
    // SECTION 4: ALU — SUBTRACTION
    // ════════════════════════════════════════════════════════
    {
        name: "ALU Sub: 0 - 0 = 0",
        asm: ["sub a0,zero,zero","sw a0,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Sub: 1 - 1 = 0",
        asm: ["addi a0,zero,1","sub a1,a0,a0","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Sub: x - x = 0 (arbitrary x)",
        asm: ["lui a0,0x12345","sub a1,a0,a0","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU Sub: 0 - 1 = 0xFFFFFFFF",
        asm: ["addi a1,zero,1","sub a2,zero,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0xFFFFFFFF; }
    },
    {
        name: "ALU Sub: 0x80000000 - 1 = 0x7FFFFFFF",
        asm: ["lui a0,0x80000","addi a1,zero,1","sub a2,a0,a1","sw a2,256(zero)","ebreak"],

    },

    // ════════════════════════════════════════════════════════
    // SECTION 5: ALU — LOGICAL
    // ════════════════════════════════════════════════════════
    {
        name: "ALU AND: x & 0 = 0",
        asm: ["lui a0,0x12345","and a1,a0,zero","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {
        name: "ALU OR: x | 0xFFFFFFFF = 0xFFFFFFFF",
        asm: ["lui a0,0x12345","addi a1,zero,-1","or a2,a0,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0xFFFFFFFF; }
    },
    {

        asm: ["lui a0,0x12345","xor a1,a0,zero","sw a1,256(zero)","ebreak"],

    },

            "lui a0,0xAAAAB", "addi a0,a0,0xAAA", // a0 = 0xAAAAAAAA

        ],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },
    {

        asm: ["lui a0,0xAAAAB","addi a0,a0,0xAAA","lui a1,0x55555","addi a1,a1,0x555","xor a2,a0,a1","sw a2,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0xFFFFFFFF; }
    },
    {
        name: "ALU XOR: 0xFFFFFFFF ^ 0xFFFFFFFF = 0",

        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0; }
    },

    // ════════════════════════════════════════════════════════
    // SECTION 6: SHIFTS
    // ════════════════════════════════════════════════════════
    {

    },
    {
        name: "Shift SLL: shift-by-0 identity (register-register)",

        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0x12345000; }
    },
    {
        name: "Shift SLLI: 0xFFFFFFFF << 1 = 0xFFFFFFFE",
        asm: ["addi a0,zero,-1","slli a1,a0,1","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0xFFFFFFFE; }
    },
    {
        name: "Shift SLLI: 1 << 31 = 0x80000000",
        asm: ["addi a0,zero,1","slli a1,a0,31","sw a1,256(zero)","ebreak"],
        verify(cpu) { cpu.run_cycles(100000); return mem(cpu,64)===0x80000000; }
    },

function buildDriverCpp(simCpp) {
    return `\
#include <cxxrtl/cxxrtl.h>

static char heap[524288];
static size_t heap_top = 0;
void* operator new(size_t n) { size_t aligned = (n + 7) & ~7u; if (heap_top + aligned > sizeof(heap)) return (void*)0; void* p = heap + heap_top; heap_top += aligned; return p; }
void* operator new[](size_t n) { return operator new(n); }
void operator delete(void*) noexcept {}
void operator delete[](void*) noexcept {}
void operator delete(void*, size_t) noexcept {}
void operator delete[](void*, size_t) noexcept {}

#define CXXRTL_NDEBUG 1
#include "sim.cpp"

cxxrtl_design::p_zero__soc dut;
uint32_t ram[4096];
int halted = 0;
uint32_t signal_flags = 0;

static void clk_lo() { dut.p_clk.data[0]=0; dut.step(); }
static void clk_hi() { dut.p_clk.data[0]=1; dut.step(); }

static uint32_t trace_buf[8192]; 
static int trace_len = 0;

static void bus_tick_traced(int timer_irq_val, int c, bool do_trace) {
    dut.p_clk.data[0] = 0;
    dut.p_timer__irq.data[0] = timer_irq_val;
    dut.step();

    uint32_t iadr = dut.p_ibus__adr.data[0];
    int icyc = dut.p_ibus__cyc.data[0];
    
    if(icyc && (iadr & 3)) signal_flags |= (1u<<8);

    uint32_t dcyc = dut.p_dbus__cyc.data[0];
    uint32_t dadr = dut.p_dbus__adr.data[0];
    uint32_t ddat = dut.p_dbus__dat.data[0];
    uint32_t dwe  = dut.p_dbus__we.data[0];

    if(do_trace && (icyc || dcyc) && trace_len + 6 < 8192) {
        trace_buf[trace_len++] = (uint32_t)c;
        trace_buf[trace_len++] = icyc ? iadr : 0xFFFFFFFF;
        trace_buf[trace_len++] = icyc ? ram[(iadr>>2)&0xFFF] : 0;
        trace_buf[trace_len++] = dcyc ? dadr : 0xFFFFFFFF;
        trace_buf[trace_len++] = dcyc ? (ddat | (dwe << 31)) : 0;
        trace_buf[trace_len++] = dut.p_cpu_2e_cpu_2e_decode_2e_opcode.curr.data[0]
                               | (dut.p_cpu_2e_cpu_2e_decode_2e_funct3.curr.data[0] << 8);
    }

    if(icyc) {
        uint32_t inst = ram[(iadr>>2)&0xFFF];
        if(inst == 0x00100073u) {
            if (halted == 0) halted = 400;
        }
        dut.p_ibus__rdt.data[0] = inst;
        dut.p_ibus__ack.data[0] = 1;
    } else {
        dut.p_ibus__ack.data[0] = 0;
    }

    if(dcyc && (dadr & 3)) signal_flags |= (1u<<9);
    if(dcyc) {
        uint32_t idx = (dadr>>2)&0xFFF;
        if(dut.p_dbus__we.data[0]) {
            uint32_t dat = dut.p_dbus__dat.data[0];
            uint32_t sel = dut.p_dbus__sel.data[0];
            uint32_t mask = 0;
            if(sel&1) mask|=0x000000FFu;
            if(sel&2) mask|=0x0000FF00u;
            if(sel&4) mask|=0x00FF0000u;
            if(sel&8) mask|=0xFF000000u;
            ram[idx] = (ram[idx] & ~mask) | (dat & mask);
        } else {
            dut.p_dbus__rdt.data[0] = ram[idx];
        }
        dut.p_dbus__ack.data[0] = 1;
    } else {
        dut.p_dbus__ack.data[0] = 0;
    }

    dut.p_clk.data[0] = 1;
    dut.step();

    dut.p_ibus__ack.data[0] = 0;
    dut.p_dbus__ack.data[0] = 0;
}

extern "C" {
    __attribute__((export_name("init_cpu"))) void init_cpu() {
        for(int i=0;i<4096;i++) ram[i]=0;
        signal_flags = 0;
        halted = 0;
        dut.reset();

        for(size_t i = 0; i < 576; i++){
            dut.memory_p_cpu_2e_rf__ram_2e_memory.data[i] = cxxrtl::value<2>{0u};
        }

        dut.p_rst__n.data[0] = 0;
        dut.p_ibus__ack.data[0] = 0;
        dut.p_dbus__ack.data[0] = 0;
        dut.p_timer__irq.data[0] = 0;
        dut.p_ibus__rdt.data[0] = 0;
        dut.p_dbus__rdt.data[0] = 0;

        for(int i=0;i<200;i++){
            dut.p_clk.data[0]=0; dut.step();
            dut.p_clk.data[0]=1; dut.step();
        }
        dut.p_rst__n.data[0] = 1;
        dut.step();
    }

    __attribute__((export_name("load_inst"))) void load_inst(int word_addr, uint32_t inst) { ram[word_addr] = inst; }
    __attribute__((export_name("read_mem"))) uint32_t read_mem(int word_addr) { return ram[word_addr]; }
    __attribute__((export_name("get_flags"))) uint32_t get_flags() { return signal_flags; }

    __attribute__((export_name("run_cycles"))) int run_cycles(int max_cycles) {
        int c = 0;
        while(c < max_cycles && halted != 1) { 
            bus_tick_traced(0, c, false); 
            if(halted > 1) halted--;
            c++; 
        }
        return c;
    }

    __attribute__((export_name("run_with_timer_irq"))) int run_with_timer_irq(int assert_at, int max_cycles) {
        int c = 0;
        while(c < max_cycles && halted != 1) { 
            bus_tick_traced(c >= assert_at ? 1 : 0, c, false); 
            if(halted > 1) halted--;
            c++; 
        }
        return c;
    }
    __attribute__((export_name("run_with_timer_irq_pulse"))) 
    int run_with_timer_irq_pulse(int assert_at, int deassert_at, int reassert_at, int max_cycles) {
        int c = 0;
        while(c < max_cycles && halted != 1) {
            int irq = (c >= assert_at && c < deassert_at) || (c >= reassert_at);
            bus_tick_traced(irq, c, false);
            if(halted > 1) halted--;
            c++;
        }
        return c;
    }

    __attribute__((export_name("run_reset_check"))) uint32_t run_reset_check() {
        dut.reset();
        for(size_t i = 0; i < 576; i++){
            dut.memory_p_cpu_2e_rf__ram_2e_memory.data[i] = cxxrtl::value<2>{0u};
        }
        dut.p_rst__n.data[0] = 0;
        dut.p_timer__irq.data[0] = 0;
        uint32_t cyc_high = 0;
        
        for(int i=0;i<50;i++){
            dut.p_clk.data[0]=0; dut.step();
            if(dut.p_ibus__cyc.data[0]) cyc_high++;
            dut.p_clk.data[0]=1; dut.step();
        }
        dut.p_rst__n.data[0] = 1; dut.step();
        halted = 0;
        return cyc_high;
    }

    __attribute__((export_name("run_traced"))) int run_traced(int ncycles) {
        trace_len = 0;
        int c = 0;
        while(c < ncycles && halted != 1) {
            bus_tick_traced(0, c, true);
            if(halted > 1) halted--;
            c++;
        }
        return trace_len;
    }

    __attribute__((export_name("get_trace_word"))) uint32_t get_trace_word(int i) {
        return (i >= 0 && i < trace_len) ? trace_buf[i] : 0;
    }

    __attribute__((export_name("dump_rfram"))) uint32_t dump_rfram(int i) {
        if(i < 0 || i >= 576) return 0;
        return dut.memory_p_cpu_2e_rf__ram_2e_memory.data[i].data[0];
    }

    __attribute__((export_name("__wasm_call_ctors"))) void __wasm_call_ctors();
}
`;
}

const wrapperVerilog = `
module zero_soc (
    input  logic        clk,
    input  logic        rst_n,
    input  logic        timer_irq,
    output logic [31:0] ibus_adr,
    output logic        ibus_cyc,
    input  logic [31:0] ibus_rdt,
    input  logic        ibus_ack,
    output logic [31:0] dbus_adr,
    output logic [31:0] dbus_dat,

    output logic        dbus_we,
    output logic        dbus_cyc,
    input  logic [31:0] dbus_rdt,
    input  logic        dbus_ack
);
    serv_rf_top #(.RESET_PC(32'h0000_0000)) cpu (
        .clk(clk), .i_rst(~rst_n), .i_timer_irq(timer_irq),
        .o_ibus_adr(ibus_adr), .o_ibus_cyc(ibus_cyc),
        .i_ibus_rdt(ibus_rdt), .i_ibus_ack(ibus_ack),
        .o_dbus_adr(dbus_adr), .o_dbus_dat(dbus_dat),
        .o_dbus_sel(dbus_sel), .o_dbus_we(dbus_we),
        .o_dbus_cyc(dbus_cyc), .i_dbus_rdt(dbus_rdt),
        .i_dbus_ack(dbus_ack)
    );
endmodule`;

// ── TRACE HANDLER ──────────────────────────────────────────────────────────
async function runDiagnosticTrace() {
    if (!wasmBinary) return;
    log('\n── RUNNING CYCLE-ACCURATE BUS TRACE ──\nCheck browser console (F12) for detailed data.', '#d4aa00');
    
    console.group('🐛 DIAGNOSTIC TRACE: addi x1,zero,42 -> sw x1,256(zero)');
    try {
        const { instance } = await WebAssembly.instantiate(wasmBinary, { env: new Proxy({}, { get: () => () => 0 }) });
        const cpu = instance.exports;
        if (cpu.__wasm_call_ctors) cpu.__wasm_call_ctors();
        
        const prog = ASM(["addi x1,zero,42", "sw x1,256(zero)", "ebreak"]);
        cpu.init_cpu();
        prog.forEach((w, idx) => cpu.load_inst(idx, w));
        
        const len = cpu.run_traced(1000);
        console.log(`Trace complete: ${len/6} bus events captured.`);
        
        const traceTable = [];
        for (let i = 0; i < len; i += 6) {
            const cyc    = cpu.get_trace_word(i);
            const iadr   = cpu.get_trace_word(i+1);
            const inst   = cpu.get_trace_word(i+2);
            const dadr   = cpu.get_trace_word(i+3);
            const ddat   = cpu.get_trace_word(i+4);
            const decode = cpu.get_trace_word(i+5);
            
            const we = (ddat >>> 31) & 1;
            const dat = ddat & 0x7FFFFFFF;

            traceTable.push({
                Cycle: cyc,
                Fetch_Addr: iadr !== 0xFFFFFFFF ? `0x${iadr.toString(16).padStart(8,'0')}` : '-',
                Instruction: iadr !== 0xFFFFFFFF ? `0x${inst.toString(16).padStart(8,'0')}` : '-',
                Opcode: iadr !== 0xFFFFFFFF ? `0x${(decode & 0x7F).toString(16)}` : '-',
                Funct3: iadr !== 0xFFFFFFFF ? `0x${((decode >> 8) & 0x7).toString(16)}` : '-',
                Bus_Action: dadr !== 0xFFFFFFFF ? (we ? 'WRITE' : 'READ') : '-',
                Data_Addr: dadr !== 0xFFFFFFFF ? `0x${dadr.toString(16).padStart(8,'0')}` : '-',
                Data_Val: dadr !== 0xFFFFFFFF ? `0x${dat.toString(16).padStart(8,'0')}` : '-'
            });
        }
        
        console.table(traceTable);
        
        const m64 = mem(cpu, 64);
        console.log(`Post-Execution Memory[64]: ${m64} (0x${m64.toString(16)})`);

        const rfDump = [];
        for (let i = 0; i < 576; i++) {
            const val = cpu.dump_rfram(i);
            if (val !== 0) {
                rfDump.push({
                    Index: i,
                    Reg: (i < 512) ? `x${Math.floor(i / 16)}` : `sys_${Math.floor(i / 16)}`,
                    Chunk: i % 16,
                    Value: `0x${val.toString(16)}`
                });
            }
        }
        console.log('RF RAM Dump (Non-Zero Entries):');
        console.table(rfDump);
        
    } catch (e) {
        console.error(`Trace Error:`, e);
        log(`Trace Error: ${e.message}`, '#f97171');
    }
    console.groupEnd();
}

async function runSuite() {
    document.getElementById('buildBtn').disabled = true;
    traceBtn.disabled = true;
    logEl.innerHTML = '';
    sumEl.textContent = '';
    cppEl.textContent = '/* Synthesizing... */';
    dlBtn.disabled = true;
    buildUI();

    try {
        const dec = new TextDecoder();
        const toStr = v => v ? (typeof v === 'string' ? v : dec.decode(v)) : '';

        log('Fetching SERV RTL from jsDelivr...');
        const servFiles = [
            'serv_aligner.v','serv_alu.v','serv_bufreg.v','serv_bufreg2.v',
            'serv_compdec.v','serv_csr.v','serv_ctrl.v','serv_debug.v',
            'serv_decode.v','serv_immdec.v','serv_mem_if.v','serv_rf_if.v',
            'serv_rf_ram_if.v','serv_rf_ram.v','serv_rf_top.v','serv_state.v','serv_top.v'
        ];
        const vfs = { 'input.v': wrapperVerilog };
        await Promise.all(servFiles.map(async f => {
            const r = await fetch(`https://cdn.jsdelivr.net/gh/olofk/serv@main/rtl/${f}`);
            if (!r.ok) throw new Error(`Failed to fetch ${f}`);
            vfs[f] = await r.text();
        }));
        log('RTL fetched ✓', '#69db7c');

        log('Running Yosys synthesis...', '#ffd43b');
        const cmds = [
            'read_verilog -sv input.v',
            ...servFiles.map(f => `read_verilog -sv ${f}`),
            'prep -top zero_soc',
            'write_cxxrtl sim.cpp'
        ].join('; ');
        const yOut = await runYosys(['-p', cmds], vfs);
        const simCpp = toStr(yOut['sim.cpp']);
        if (!simCpp) throw new Error('Yosys produced no sim.cpp');
        log('Synthesis complete ✓', '#69db7c');

        const driverCpp = buildDriverCpp(simCpp);
        
        cppEl.textContent = `/* ========================================================
   DRIVER.CPP (WebAssembly Testbench Wrapper)
   ======================================================== */\n\n` + driverCpp + 
   `\n\n/* ========================================================
   SIM.CPP (CXXRTL Generated Model from Yosys)
   ======================================================== */\n\n` + simCpp;
        
        dlBtn.disabled = false;
        dlBtn.onclick = () => {
            const blob = new Blob([simCpp], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sim.cpp';
            a.click();
        };

        log('Fetching CXXRTL header...', '#ffd43b');
        const hRes = await fetch('https://cdn.jsdelivr.net/gh/JadanPoll/makerchip-vizinteract@main/cxxrtl_bare_baremetal.h');
        const header = await hRes.text();

        log('Compiling C++ → WebAssembly...', '#ffd43b');
        const cOut = await runClang(
            ['clang++','-std=c++17','-O2','-I/',
             '--target=wasm32','-nostdlib','-nostdinc',
             '-fno-exceptions','-fno-rtti',
             '-Wl,--export=__wasm_call_ctors',
             '-Wl,--no-entry','-Wl,--allow-undefined',
             'driver.cpp','-o','sim.wasm'],
            { 'driver.cpp': driverCpp, 'sim.cpp': simCpp, 'cxxrtl': { 'cxxrtl.h': header } }
        );
        if (!cOut['sim.wasm']) throw new Error('Clang produced no sim.wasm');
        log('Compilation complete ✓', '#69db7c');

        wasmBinary = cOut['sim.wasm'];
        traceBtn.disabled = false;

        log(`\nWasm ready. Running ${TESTS.length} tests...\n`, '#69db7c');

        console.groupCollapsed('ASM Sanity Check');
        const sanity = [
            ['addi a0,zero,42',   ['addi a0,zero,42'],          [0x02a00513]],
            ['addi x1,zero,1',    ['addi x1,zero,1'],            [0x00100093]],
            ['lui a0,0x12345',    ['lui a0,0x12345'],             [0x12345537]],
            ['auipc a0,1',        ['auipc a0,1'],                 [0x00001517]],
            ['sw a0,256(zero)',   ['sw a0,256(zero)'],            [0x10a02023]],
            ['sw x1,256(zero)',   ['sw x1,256(zero)'],            [0x10102023]],
            ['sb a0,257(zero)',   ['sb a0,257(zero)'],            [0x10a000a3]],
            ['add x2,x1,x1',     ['add x2,x1,x1'],              [0x00108133]],
            ['srai a1,a0,31',     ['srai a1,a0,31'],             [0x41f55593]],
            ['sltiu a1,a0,1',     ['sltiu a1,a0,1'],             [0x00153593]],
            ['beq x0,x0,+8',     ['beq x0,x0,8'],               [0x00000463]],
            ['jal ra,+12',        ['jal ra,12'],                  [0x00c000ef]],
            ['jalr ra,a0,0',      ['jalr ra,a0,0'],              [0x000500e7]],
            ['csrrw a1,0x340,a0', ['csrrw a1,0x340,a0'],         [0x340515f3]],
            ['csrr a1,0x342',     ['csrr a1,0x342'],             [0x342025f3]],
            ['ecall',             ['ecall'],                      [0x00000073]],
            ['ebreak',            ['ebreak'],                     [0x00100073]],
            ['mret',              ['mret'],                       [0x30200073]],
        ];

        let asmOk = true;
        for (const [desc, lines, expected] of sanity) {
            const got = ASM(lines);
            const match = got.length === expected.length && got.every((w,i) => (w>>>0) === (expected[i]>>>0));
            if (!match) {
                console.log(`%c FAIL  ${desc}: got 0x${(got[0]>>>0).toString(16).padStart(8,'0')} expected 0x${(expected[0]>>>0).toString(16).padStart(8,'0')}`, 'color:#f97171');
                asmOk = false;
            } else {
                console.log(`%c  ok    ${desc}: 0x${(got[0]>>>0).toString(16).padStart(8,'0')}`, 'color:#69db7c');
            }
        }
        console.groupEnd();
        
        if (!asmOk) log('ASM has encoding bugs — fix before trusting test results', '#f97171');

        await runDiagnosticTrace();

        log('\n── RUNNING GAUNTLET ──', '#ffd43b');

        let passed = 0, failed = 0;

        for (let i = 0; i < TESTS.length; i++) {
            const { instance } = await WebAssembly.instantiate(wasmBinary, 
                { env: new Proxy({}, { get: () => () => 0 }) });
            const cpu = instance.exports;
            if (cpu.__wasm_call_ctors) cpu.__wasm_call_ctors();
            
            const t = TESTS[i];
            const resEl = document.getElementById(`res-${i}`);
            resEl.className = 'result running';
            resEl.textContent = 'Running...';
            await new Promise(r => setTimeout(r, 0)); 

            console.groupCollapsed(`Test ${i+1}: ${t.name}`);

            try {
                const words = ASM(t.asm);
                console.log('ASM encoding:', words.map(w => '0x' + (w>>>0).toString(16).padStart(8,'0')));
                
                cpu.init_cpu();
                words.forEach((w, idx) => cpu.load_inst(idx, w));
                const ok = t.verify(cpu);
                
                if (ok) {
                    resEl.className = 'result pass';
                    resEl.textContent = 'PASS ✓';
                    passed++;
                    log(`  PASS  [${i+1}] ${t.name}`, '#69db7c');
                    console.log('%c PASS ', 'color: #69db7c; font-weight: bold;');
                } else {
                    resEl.className = 'result fail';
                    resEl.textContent = 'FAIL ✗';
                    failed++;
                    log(`  FAIL  [${i+1}] ${t.name}`, '#f97171');
                    console.log('%c FAIL ', 'color: #f97171; font-weight: bold;');
                }
            } catch(e) {
                resEl.className = 'result fail';
                resEl.textContent = `ERROR: ${e.message}`;
                failed++;
                log(`  ERR   [${i+1}] ${t.name}: ${e.message}`, '#f97171');
                console.error(e);
            }
            console.groupEnd();
        }

        const color = failed === 0 ? '#69db7c' : '#ffd43b';
        const msg = `\n══ GAUNTLET COMPLETE: ${passed}/${TESTS.length} passed, ${failed} failed ══`;
        log(msg, color);
        sumEl.style.color = color;
        sumEl.textContent = `${passed}/${TESTS.length} passed — ${failed} failed`;

    } catch(e) {
        log(`\nFATAL: ${e.message}\n${e.stack||''}`, '#f97171');
    } finally {
        document.getElementById('buildBtn').disabled = false;
    }
}

document.getElementById('buildBtn').onclick = runSuite;
traceBtn.onclick = runDiagnosticTrace;
buildUI();
</script>
</body>
</html>
